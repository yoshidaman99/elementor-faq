name: Push to Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: true
        default: 'develop'
      dry-run:
        description: 'Dry run (no push)'
        required: false
        default: false
        type: boolean

jobs:
  test-and-push:
    name: Test and Push to Test Branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fetch all branches
        run: |
          git fetch origin

      - name: Checkout source branch
        run: |
          git checkout ${{ github.event.inputs.branch }}

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.event.inputs.branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, mysqli
          coverage: xdebug
          tools: composer, phpunit

      - name: Install Composer dependencies
        run: |
          cd .test
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run quick tests
        run: |
          cd .test
          ./vendor/bin/phpunit --testsuite Unit --stop-on-failure

      - name: Run full test suite
        run: |
          cd .test
          ./vendor/bin/phpunit --configuration config/phpunit.xml --coverage-clover results/coverage.xml

      - name: Verify coverage
        run: |
          coverage=$(php -r "echo simplexml_load_file('.test/results/coverage.xml')->project->metrics['coveredstatements'] / simplexml_load_file('.test/results/coverage.xml')->project->metrics['statements'] * 100;")
          echo "Coverage: $coverage%"
          if (( $(echo "$coverage < 90" | bc -l) )); then
            echo "❌ Coverage $coverage% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage $coverage% meets threshold"

      - name: Run security scan
        run: |
          cd .test
          composer require --dev squizlabs/php_codesniffer
          vendor/bin/phpcs --standard=WordPress --extensions=php --ignore=vendor ./src

      - name: Merge to test branch
        if: ${{ !github.event.inputs.dry-run }}
        run: |
          git checkout test || git checkout -b test
          git merge ${{ github.event.inputs.branch }} --no-edit
          git push origin test

      - name: Summary
        run: |
          echo "## Push to Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Branch:** ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Branch:** test" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ github.event.inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
